<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom Manipulation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
        <display id="inventory">
            <p>Inventory</p>
            <div class="inventoryItems">   
                <ul>Armour</ul>
                <ul>Potions</ul>
                <ul>Shield</ul>
                <ul>Heavy stone</ul>
            </div>
        </display>
        <div class="buttons">
            <button id="addItem">Add new item</button>
            <button id="removeItem">Remove item</button>
            <button id="checkReadyness">Check readyness</button>
        </div>

    <script src="script.js"></script>
</body>
</html>
